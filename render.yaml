services:
  - type: web
    name: foodflux
    env: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.9
      - key: OTP_SMS_PROVIDER
        value: mock
      - key: USE_REAL_SMS
        value: false