services:
  - type: web
    name: foodflux
    env: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.9