{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-3">Hotel Manager Login</h2>
                <p class="text-muted mb-4">Access menu control, order handling, and delivery operations.</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="manager@ckfood.com" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter manager password" required />
                    </div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                <div class="text-center mt-3 small text-muted">
                    <a href="{{ url_for('login') }}">Customer login</a> |
                    <a href="{{ url_for('delivery_login') }}">Delivery login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
