{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="row justify-content-center my-5">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="card-title mb-4 text-center">Restaurant Login</h2>
                    <p class="text-muted text-center mb-4">Access your restaurant dashboard</p>

                    <form method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="restaurant@example.com" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                            Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small">Need help? <a href="{{ url_for('home') }}">Go back home</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
